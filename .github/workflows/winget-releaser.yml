name: Publish Releases to WinGet
on:
  release:
    types: [published]
jobs:
  publish-alpha:
    runs-on: ubuntu-latest
    if: contains(github.event.release.tag_name, '-alpha')
    steps:
      - uses: vedantmgoyal9/winget-releaser@f7efa6288d37219838d58cb2d953d35b71ebc5d3
        with:
          identifier: prayag17.Blink.Alpha
          version: ${{ github.event.release.tag_name }}
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

  publish-stable:
    runs-on: ubuntu-latest
    if: "!contains(github.event.release.tag_name, '-alpha')"
    steps:
      - uses: vedantmgoyal9/winget-releaser@f7efa6288d37219838d58cb2d953d35b71ebc5d3
        with:
          identifier: prayag17.Blink
          version: ${{ github.event.release.tag_name }}
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
